<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Create Order</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-MCw98/SFnGE8fJT3GXwEOngsV7Zt27NXFoaoApmYm81iuXoPkFOJwJ8ERdknLPMO" crossorigin="anonymous">
</head>
<body>
<div class="container my-4">
    <h2>Create Order</h2>
    <form th:action="@{/order/create}" method="post">
        <div class="form-group">
            <label for="authorInput">Author</label>
            <input type="text" class="form-control mb-3 col-4" id="authorInput" name="author" placeholder="Enter your name">
        </div>
        <div class="form-group">
            <label for="productNameInput">Product Name</label>
            <input type="text" class="form-control mb-3 col-4" id="productNameInput" name="productName" placeholder="Enter product name">
        </div>
        <div class="form-group">
            <label for="productQuantityInput">Product Quantity</label>
            <input type="number" class="form-control mb-3 col-4" id="productQuantityInput" name="productQuantity" placeholder="Enter quantity" min="1">
        </div>
        <button type="submit" class="btn btn-primary">Create Order</button>
    </form>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p" crossorigin="anonymous"></script>
</body>
</html>
