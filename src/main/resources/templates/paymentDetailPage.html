<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Payment Detail</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-MCw98/SFnGE8fJT3GXwEOngsV7Zt27NXFoaoApmYm81iuXoPkFOJwJ8ERdknLPMO" crossorigin="anonymous">
</head>
<body>
<div class="container my-4">
    <h2>Payment Detail</h2>
    <div class="card">
        <div class="card-body">
            <p><strong>Payment ID:</strong> <span th:text="${payment.id}"></span></p>
            <p><strong>Method:</strong> <span th:text="${payment.method}"></span></p>
            <p><strong>Status:</strong> <span th:text="${payment.status}"></span></p>
            <p><strong>Order ID:</strong> <span th:text="${payment.order.id}"></span></p>
        </div>
    </div>
    <div class="mt-3">
        <a th:href="@{/payment/detail}" class="btn btn-secondary btn-sm">Back</a>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p" crossorigin="anonymous"></script>
</body>
</html>
