<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Payment Result</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-MCw98/SFnGE8fJT3GXwEOngsV7Zt27NXFoaoApmYm81iuXoPkFOJwJ8ERdknLPMO" crossorigin="anonymous">
</head>
<body>
<div class="container my-4">
    <h2>Payment Result</h2>
    <div class="alert alert-info">
        <p><strong>Payment ID:</strong> <span id="paymentId" th:text="${paymentId}"></span></p>
        <p><strong>Status:</strong> <span th:text="${paymentStatus}"></span></p>
    </div>
    <a th:href="@{/order/history}" class="btn btn-primary">Back to History</a>
    <a th:href="@{/payment/detail/{id}(id=${paymentId})}" class="btn btn-secondary ml-2">View Payment Detail</a>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p" crossorigin="anonymous"></script>
</body>
</html>
