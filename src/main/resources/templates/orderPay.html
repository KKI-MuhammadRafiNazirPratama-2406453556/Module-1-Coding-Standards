<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Order Pay</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-MCw98/SFnGE8fJT3GXwEOngsV7Zt27NXFoaoApmYm81iuXoPkFOJwJ8ERdknLPMO" crossorigin="anonymous">
</head>
<body>
<div class="container my-4">
    <h2>Pay Order</h2>
    <div class="card mb-4">
        <div class="card-body">
            <h5 class="card-title">Order Details</h5>
            <p><strong>Order ID:</strong> <span th:text="${order.id}"></span></p>
            <p><strong>Author:</strong> <span th:text="${order.author}"></span></p>
            <p><strong>Status:</strong> <span th:text="${order.status}"></span></p>
            <p><strong>Products:</strong>
                <span th:each="product, iterStat : ${order.products}">
                    <span th:text="${product.productName + ' x' + product.productQuantity}"></span>
                    <span th:if="${!iterStat.last}">, </span>
                </span>
            </p>
        </div>
    </div>

    <form th:action="@{/order/pay/{id}(id=${order.id})}" method="post">
        <div class="form-group mb-3">
            <label for="methodSelect">Payment Method</label>
            <select class="form-control col-4" id="methodSelect" name="method" onchange="toggleFields(this.value)">
                <option value="VOUCHER_CODE">Voucher Code</option>
                <option value="BANK_TRANSFER">Bank Transfer</option>
            </select>
        </div>

        <div id="voucherSection" class="form-group mb-3">
            <label for="voucherCodeInput">Voucher Code</label>
            <input type="text" class="form-control col-4" id="voucherCodeInput" name="voucherCode"
                   placeholder="Enter 16-character voucher code (e.g. ESHOP1234ABC5678)">
        </div>

        <div id="bankSection" class="form-group mb-3" style="display:none">
            <div class="form-group mb-2">
                <label for="bankNameInput">Bank Name</label>
                <input type="text" class="form-control col-4" id="bankNameInput" name="bankName" placeholder="Enter bank name">
            </div>
            <div class="form-group">
                <label for="referenceCodeInput">Reference Code</label>
                <input type="text" class="form-control col-4" id="referenceCodeInput" name="referenceCode" placeholder="Enter reference code">
            </div>
        </div>

        <button type="submit" class="btn btn-success">Submit Payment</button>
        <a th:href="@{/order/history}" class="btn btn-secondary ml-2">Cancel</a>
    </form>
</div>
<script>
    function toggleFields(method) {
        document.getElementById('voucherSection').style.display = method === 'VOUCHER_CODE' ? 'block' : 'none';
        document.getElementById('bankSection').style.display = method === 'BANK_TRANSFER' ? 'block' : 'none';
    }
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p" crossorigin="anonymous"></script>
</body>
</html>
